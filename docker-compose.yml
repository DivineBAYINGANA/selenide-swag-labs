# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.yml — Swag Labs Selenide Tests with Selenium Grid
#
# STEP 1 — Run the tests and generate the report:
#   docker compose up --build --abort-on-container-exit selenium-hub chrome-node test-runner
#
# STEP 2 — Open the report (run after Step 1 finishes):
#   docker compose up allure-report
#   Then open: http://localhost:8080
#
# Run smoke only:
#   SUITE=smoke docker compose up --build --abort-on-container-exit selenium-hub chrome-node test-runner
# ─────────────────────────────────────────────────────────────────────────────
services:

  # ── Selenium Grid Hub ───────────────────────────────────────────────────────
  selenium-hub:
    image: selenium/hub:4.18.1
    container_name: selenium-hub
    ports:
      - "4442:4442"
      - "4443:4443"
      - "4444:4444"
    environment:
      - SE_SESSION_REQUEST_TIMEOUT=300
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4444/wd/hub/status"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ── Chrome Node ─────────────────────────────────────────────────────────────
  chrome-node:
    image: selenium/node-chrome:4.18.1
    container_name: chrome-node
    depends_on:
      selenium-hub:
        condition: service_healthy
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_NODE_MAX_SESSIONS=4
      - SE_NODE_SESSION_TIMEOUT=300
      - START_XVFB=false
    shm_size: "2gb"
    volumes:
      - /dev/shm:/dev/shm

  # ── Test Runner ─────────────────────────────────────────────────────────────
  test-runner:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: test-runner
    depends_on:
      selenium-hub:
        condition: service_healthy
    environment:
      - HEADLESS=true
      - BROWSER=chrome
      - SUITE=${SUITE:-}
      - SELENIDE_REMOTE=http://selenium-hub:4444/wd/hub
    volumes:
      # Expose the generated report back to the host
      - ./target:/app/target

  # ── Allure Report (nginx) ───────────────────────────────────────────────────
  # Run AFTER Step 1 completes: docker compose up allure-report
  # Then open http://localhost:8080
  allure-report:
    image: nginx:alpine
    container_name: allure-report
    ports:
      - "8080:80"
    volumes:
      # Point directly at the generated HTML report folder, not the whole target dir
      - ./target/allure-report:/usr/share/nginx/html:ro
    profiles:
      - report